<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        p.subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: #aaa;
        }

        input, select {
            background: #111;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 10px 14px;
            color: #f0f0f0;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            border-color: #555;
        }

        select option {
            background: #1a1a1a;
        }

        button {
            margin-top: 28px;
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #ddd;
        }

        .result {
            margin-top: 24px;
            padding: 16px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
        }

        .result.churn {
            background: #2a1010;
            border: 1px solid #7f1d1d;
            color: #f87171;
        }

        .result.no-churn {
            background: #0f2a1a;
            border: 1px solid #14532d;
            color: #4ade80;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Customer Churn Predictor</h1>
    <p class="subtitle">Fill in the customer details below to predict churn likelihood.</p>

    <form action="/predict" method="POST">
        <div class="grid">

            <div class="field">
                <label>Gender</label>
                <select name="gender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="field">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen">
                    <option value="0">No</option>
                    <option value="1">Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Partner</label>
                <select name="Partner">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="field">
                <label>Dependents</label>
                <select name="Dependents">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="field">
                <label>Tenure (months)</label>
                <input type="number" name="tenure" placeholder="e.g. 12" min="0" required>
            </div>

            <div class="field">
                <label>Phone Service</label>
                <select name="PhoneService">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="field">
                <label>Multiple Lines</label>
                <select name="MultipleLines">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No phone service">No phone service</option>
                </select>
            </div>

            <div class="field">
                <label>Internet Service</label>
                <select name="InternetService">
                    <option value="DSL">DSL</option>
                    <option value="Fiber optic">Fiber optic</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="field">
                <label>Online Security</label>
                <select name="OnlineSecurity">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Online Backup</label>
                <select name="OnlineBackup">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Device Protection</label>
                <select name="DeviceProtection">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Tech Support</label>
                <select name="TechSupport">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming TV</label>
                <select name="StreamingTV">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming Movies</label>
                <select name="StreamingMovies">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                    <option value="No internet service">No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Contract</label>
                <select name="Contract">
                    <option value="Month-to-month">Month-to-month</option>
                    <option value="One year">One year</option>
                    <option value="Two year">Two year</option>
                </select>
            </div>

            <div class="field">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling">
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>

            <div class="field">
                <label>Payment Method</label>
                <select name="PaymentMethod">
                    <option value="Bank transfer (automatic)">Bank transfer</option>
                    <option value="Credit card (automatic)">Credit card</option>
                    <option value="Electronic check">Electronic check</option>
                    <option value="Mailed check">Mailed check</option>
                </select>
            </div>

            <div class="field">
                <label>Monthly Charges ($)</label>
                <input type="number" name="MonthlyCharges" placeholder="e.g. 65.00" step="0.01" required>
            </div>

            <div class="field" style="grid-column: span 2;">
                <label>Total Charges ($)</label>
                <input type="number" name="TotalCharges" placeholder="e.g. 780.00" step="0.01" required>
            </div>

        </div>

        <button type="submit">Predict Churn</button>
    </form>

    {% if prediction %}
        <div class="result {{ 'churn' if 'likely to CHURN' in prediction else 'no-churn' }}">
            {{ prediction }}
        </div>
    {% endif %}

</div>
</body>
</html>
